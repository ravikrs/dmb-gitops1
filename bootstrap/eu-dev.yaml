# Root Application for the eu-dev cluster.
# Apply this once manually to the eu-dev ArgoCD instance:
#   kubectl apply -f bootstrap/eu-dev.yaml -n argocd
#
# This creates all child Applications and ApplicationSets defined under clusters/eu-dev/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dmb-root-eu-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ravikrs/dmb-gitops1
    targetRevision: HEAD
    path: clusters/eu-dev
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
