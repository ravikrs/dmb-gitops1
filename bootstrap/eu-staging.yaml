# Root Application for the eu-staging cluster.
# Apply this once manually to the eu-staging ArgoCD instance:
#   kubectl apply -f bootstrap/eu-staging.yaml -n argocd
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dmb-root-eu-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ravikrs/dmb-gitops1
    targetRevision: HEAD
    path: clusters/eu-staging
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
