apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dmb-services-eu-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
    - git:
        repoURL: https://github.com/ravikrs/dmb-gitops1
        revision: HEAD
        files:
          - path: teams/dmb/eu-staging/services/*.yaml
  template:
    metadata:
      name: 'dmb-{{nameOverride}}-eu-staging'
      annotations:
        argocd.argoproj.io/sync-wave: "2"
    spec:
      project: default
      sources:
        - repoURL: https://github.com/ravikrs/dmb-gitops1
          path: charts/dmb-service
          targetRevision: HEAD
          helm:
            valueFiles:
              - $values/teams/dmb/eu-staging/_shared.yaml
              - $values/teams/dmb/eu-staging/services/{{nameOverride}}.yaml
        - repoURL: https://github.com/ravikrs/dmb-gitops1
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: dmb-staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
