apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: oauth2-proxy-eu-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          # chartRevision is pinned to a chart-oauth2-proxy-<version> git tag.
          # Bumped by promote-chart.yml when a Dependabot PR merges; never changed manually.
          - env: eu-staging
            namespace: dmb-staging
            chartRevision: chart-oauth2-proxy-10.1.4
  template:
    metadata:
      name: oauth2-proxy-eu-staging
      annotations:
        argocd.argoproj.io/sync-wave: "1"
    spec:
      project: default
      sources:
        # Chart source uses per-env pinned revision so staging/prod are promotion-gated.
        # Values source stays on HEAD so OIDC config / hostname changes deploy immediately.
        - repoURL: https://github.com/ravikrs/dmb-gitops1
          path: charts/oauth2-proxy
          targetRevision: '{{chartRevision}}'
          helm:
            valueFiles:
              - $values/teams/dmb/eu-staging/oauth2-proxy-values.yaml
        - repoURL: https://github.com/ravikrs/dmb-gitops1
          targetRevision: HEAD
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: dmb-staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
