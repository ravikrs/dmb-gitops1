site_name: dmb-gitops1
site_description: GitOps repo for the DMB dev team — Helm charts and ArgoCD ApplicationSets

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: 01-architecture.md
  - Design Decisions: 02-design-decisions.md
  - CI/CD Pipelines: 03-ci-cd-pipelines.md
  - Reliability Improvements: 04-reliability-improvements.md
  - oauth2-proxy HTTPRoute + Dependabot: 05-oauth2-proxy-httproute-dependabot.md
  - oauth2-proxy Chart Promotion: 06-oauth2-proxy-chart-promotion.md
  - ADR - GitOps Repo Structure: 07-adr-gitops-repo-structure.md
