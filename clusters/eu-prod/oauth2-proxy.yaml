apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy-eu-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    # targetRevision is pinned to a chart-oauth2-proxy-<version> git tag.
    # Bumped by promote-chart.yml when a Dependabot PR merges; never changed manually.
    - repoURL: https://github.com/ravikrs/dmb-gitops1
      path: charts/oauth2-proxy
      targetRevision: chart-oauth2-proxy-10.1.4
      helm:
        valueFiles:
          - $values/teams/dmb/eu-prod/oauth2-proxy-values.yaml
    # Values source stays on HEAD so OIDC config / hostname changes deploy immediately.
    - repoURL: https://github.com/ravikrs/dmb-gitops1
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dmb-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
