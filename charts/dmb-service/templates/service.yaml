apiVersion: v1
kind: Service
metadata:
  name: {{ include "dmb-service.fullname" . }}
  labels:
    {{- include "dmb-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "dmb-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
    - name: management
      protocol: TCP
      port: {{ .Values.managementPort }}
      targetPort: {{ .Values.managementPort }}
    {{- if .Values.grpc.enabled }}
    - name: grpc
      protocol: TCP
      port: {{ .Values.grpc.port }}
      targetPort: {{ .Values.grpc.port }}
    {{- end }}
