apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dmb-service.fullname" . }}
  labels:
    {{- include "dmb-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  selector:
    matchLabels:
      {{- include "dmb-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dmb-service.selectorLabels" . | nindent 8 }}
        azure.workload.identity/use: "true"
      annotations:
        {{- if .Values.applicationProperties }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.opentelemetry.enabled }}
        instrumentation.opentelemetry.io/inject-java: {{ .Values.opentelemetry.injectJava | quote }}
        instrumentation.opentelemetry.io/container-names: {{ .Values.opentelemetry.containerName | quote }}
        {{- end }}
    spec:
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret | quote }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      enableServiceLinks: false
      automountServiceAccountToken: false
      containers:
        - name: app
          image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: management
              containerPort: {{ .Values.managementPort }}
              protocol: TCP
            {{- if .Values.grpc.enabled }}
            - name: grpc
              containerPort: {{ .Values.grpc.port }}
              protocol: TCP
            {{- end }}
          # startupProbe gives the app up to 240s (24 * 10s) to become live before
          # liveness/readiness checks are activated. This replaces the old 120s
          # initialDelaySeconds blunt approach: once startup succeeds, liveness
          # restarts the pod within 90s of failure rather than after 120+90s.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.managementPort }}
            failureThreshold: 24
            periodSeconds: 10
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.managementPort }}
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.managementPort }}
            initialDelaySeconds: 0
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            # false: Tomcat writes its work directory under /tmp. The /tmp volume
            # below is an emptyDir so writes are memory-backed and isolated per pod.
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/application.yaml"
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.managementPort | quote }}
            {{- if .Values.grpc.enabled }}
            - name: GRPC_PORT
              value: {{ .Values.grpc.port | quote }}
            {{- end }}
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if or .Values.envFrom (and .Values.externalSecret.enabled .Values.externalSecret.secretName) }}
          envFrom:
            {{- if and .Values.externalSecret.enabled .Values.externalSecret.secretName }}
            - secretRef:
                name: {{ .Values.externalSecret.secretName }}
            {{- end }}
            {{- range .Values.envFrom }}
            - {{ toYaml . | nindent 14 | trim }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.applicationProperties }}
            - name: app-config
              mountPath: /config
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.applicationProperties }}
        - name: app-config
          configMap:
            name: {{ include "dmb-service.fullname" . }}-config
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
