apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "dmb-service.fullname" . }}-pdb
  labels:
    {{- include "dmb-service.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "dmb-service.selectorLabels" . | nindent 6 }}
