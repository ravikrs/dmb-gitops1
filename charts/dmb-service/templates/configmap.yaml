{{- if .Values.applicationProperties }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dmb-service.fullname" . }}-config
  labels:
    {{- include "dmb-service.labels" . | nindent 4 }}
data:
  application.yaml: |
    {{- .Values.applicationProperties | toYaml | nindent 4 }}
{{- end }}
