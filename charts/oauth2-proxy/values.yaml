pdb:
  minAvailable: 0

oauth2-proxy:
  image:
    registry: cariad.azurecr.io
    repository: dmb/oauth2-proxy
    tag: v7.14.3

  config:
    existingSecret: CHANGEME     # e.g. dev-oauth2-proxy-secrets (created by dmb-namespace chart)
    configFile: |-
      email_domains = [ "*" ]
      upstreams = [ "static://200" ]

  extraArgs:
    provider: keycloak-oidc
    provider-display-name: "Cloud IDP"
    oidc-issuer-url: CHANGEME
    redirect-url: CHANGEME
    oidc-email-claim: "name"
    scope: "openid"
    code-challenge-method: S256
    cookie-secure: "true"
    cookie-expire: "12h"
    cookie-refresh: "25m"
    insecure-oidc-allow-unverified-email: "true"
    skip-jwt-bearer-tokens: "true"
    pass-access-token: "true"
    pass-authorization-header: "false"
    pass-user-headers: "false"
    set-authorization-header: "false"
    set-xauthrequest: "false"

  ingress:
    enabled: false

  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "256Mi"
      cpu: "300m"

  metrics:
    enabled: false

# Gateway API HTTPRoute (Traefik) — exposes /oauth2 prefix for OIDC callback and sign-in flows.
# The backendRef service name equals .Release.Name (upstream subchart fullname convention).
# servicePort: 80 is the upstream chart's default ClusterIP service port (targetPort: 4180).
httpRoute:
  enabled: false
  parentRefs:
    - name: traefik
      namespace: ingress
      sectionName: websecure
  hostnames: []
  # - dmb-dev.apps.example.com
  servicePort: 80
