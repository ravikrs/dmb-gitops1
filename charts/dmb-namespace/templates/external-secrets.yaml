apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.env.stage }}-postgres-secrets
  namespace: {{ .Values.env.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secretstore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.env.stage }}-postgres-secrets
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.env.product }}-{{ .Values.env.stage }}-admin-username
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-admin-username
    - secretKey: {{ .Values.env.product }}-{{ .Values.env.stage }}-admin-password
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-admin-password
---
