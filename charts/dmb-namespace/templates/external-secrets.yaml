apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.env.stage }}-dmcu-secrets
  namespace: {{ .Values.env.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secretstore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.env.stage }}-dmcu-secrets
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        dmcu-cert.pfx: '{{ "{{ .dmcuCert | b64dec }}" }}'
        dmcu-pkcs12-password: '{{ "{{ .dmcuPassword }}" }}'
  data:
    - secretKey: dmcuPassword
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-dmcu-pkcs12-password
    - secretKey: dmcuCert
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-dmcu-pkcs12-cert
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.env.stage }}-oauth2-proxy-secrets
  namespace: {{ .Values.env.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.secretstore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.env.stage }}-oauth2-proxy-secrets
    creationPolicy: Owner
  data:
    - secretKey: client-id
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-cloud-idp-client-id
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-cloud-idp-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: {{ .Values.env.product }}-{{ .Values.env.stage }}-oauth2-proxy-cookie-secret
