apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.env.namespace }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.serviceAccount.clientId }}
    azure.workload.identity/tenant-id: {{ .Values.env.tenantId }}
  labels:
    azure.workload.identity/use: "true"
