apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    app: {{ .Release.Name }}-app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.env.KRAKEND_PORT }}
      targetPort: {{ .Values.env.KRAKEND_PORT }}
