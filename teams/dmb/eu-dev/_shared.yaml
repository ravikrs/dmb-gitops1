# Shared values applied to ALL 5 Spring Boot services in eu-dev.
# Service-specific values files overlay these.

image:
  pullPolicy: Always
  pullSecret: megatron-container-pull-secret

serviceAccount:
  name: dmb-dev-sa

managementPort: 8081

env:
  JAVA_TOOL_OPTIONS: "-Dhttps.protocols=TLSv1.2 -XX:MaxDirectMemorySize=1g"
  PRODUCT: dmb
  STAGE: dev

opentelemetry:
  enabled: true
  containerName: app
  injectJava: otel-auto-instrumentation

networkPolicy:
  enabled: true
  allowIngressFromNamespace: ingress
  allowIngressFromSameNamespace: true
  allowEgressToSameNamespace: true

pdb:
  minAvailable: 0
