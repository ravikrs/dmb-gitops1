pdb:
  minAvailable: 0

oauth2-proxy:
  config:
    existingSecret: dev-oauth2-proxy-secrets   # created by dmb-namespace chart

  extraArgs:
    oidc-issuer-url: CHANGEME
    redirect-url: CHANGEME                     # e.g. https://dmb-dev.apps.example.com/oauth2/callback

httpRoute:
  enabled: true
  parentRefs:
    - name: traefik
      namespace: ingress
      sectionName: websecure
  hostnames:
    - CHANGEME                                 # e.g. dmb-dev.apps.example.com
